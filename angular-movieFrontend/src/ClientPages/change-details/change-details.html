<h2 mat-dialog-title>Edytuj dane profilu</h2>
<mat-dialog-content [formGroup]="detailsForm">
  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Imię</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nazwisko</mat-label>
      <input matInput formControlName="surname">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email">
      @if (detailsForm.get('email')?.hasError('email')) {
        <mat-error>Wprowadź poprawny adres email</mat-error>
      }
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">Anuluj</button>
  <button mat-raised-button color="primary" [disabled]="detailsForm.invalid" (click)="onSubmit()">
    Zapisz zmiany
  </button>
</mat-dialog-actions>
