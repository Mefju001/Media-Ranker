<h2 mat-dialog-title>Zmiana hasła</h2>
<mat-dialog-content [formGroup]="passwordForm">
  <div class="form-container">
    <mat-form-field appearance="fill">
      <mat-label>Stare hasło</mat-label>
      <input matInput type="password" formControlName="oldPassword">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Nowe hasło</mat-label>
      <input matInput type="password" formControlName="newPassword">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Potwierdź nowe hasło</mat-label>
      <input matInput type="password" formControlName="confirmPassword">
    </mat-form-field>
    
    <mat-error *ngIf="passwordForm.hasError('mismatch')">
      Hasła muszą być identyczne!
    </mat-error>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">Anuluj</button>
  <button mat-raised-button color="primary" [disabled]="passwordForm.invalid" (click)="onSubmit()">
    Zmień hasło
  </button>
</mat-dialog-actions>
